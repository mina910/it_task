<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Course | Course Organizer</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <header>
    <h1> My Course Organizer</h1>
    <nav>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="courses.html">My Courses</a></li>
        <li><a href="addcourses.html" class="active">Add Course</a></li>
        <li><a href="contactus.html">Contact Us</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section>
      <h2>Add a New Course</h2>
      <form action="#" method="post" class="course-form">
        <div class="form-group">
          <label for="courseName">Course Name:</label>
          <input type="text" id="courseName" name="courseName" placeholder="e.g., Introduction to Psychology" required>
        </div>

        <div class="form-group">
          <label for="instructor">Instructor:</label>
          <input type="text" id="instructor" name="instructor" placeholder="Dr. / Prof. Full Name" required>
        </div>

        <div class="form-group">
          <label for="creditHours">Credit Hours:</label>
          <input type="number" id="creditHours" name="creditHours" min="1" max="6" value="3" required>
        </div>

        <div class="form-group">
          <label for="notes">Notes:</label>
          <textarea id="notes" name="notes" rows="4"
            placeholder="Any additional information, prerequisites, or reminders..."></textarea>
        </div>

        <button type="submit" class="submit-btn">Add Course</button>
        <p class="form-note">* This is a demo form — data will not be saved.</p>
      </form>
    </section>
  </main>

  <footer>
    <p>&copy; 2026 Personal Course Organizer — Built for learning HTML & CSS</p>
  </footer>
</body>

</html>
